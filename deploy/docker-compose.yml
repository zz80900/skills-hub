services:
  app:
    image: ghcr.io/zz80900/skills-hub:${APP_IMAGE_TAG:-latest}
    pull_policy: always
    container_name: ssc-skills-lib-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-skills_lib}}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-720}
      AD_ENABLED: ${AD_ENABLED:-false}
      AD_REALM: ${AD_REALM:-}
      AD_KDC: ${AD_KDC:-}
      AD_LDAP_URL: ${AD_LDAP_URL:-}
      AD_BASE_DN: ${AD_BASE_DN:-}
      AD_DOMAIN_ROOT_DN: ${AD_DOMAIN_ROOT_DN:-}
      AD_NETBIOS_DOMAIN: ${AD_NETBIOS_DOMAIN:-}
      AD_LDAP_BIND_USERNAME: ${AD_LDAP_BIND_USERNAME:-}
      AD_LDAP_BIND_PASSWORD: ${AD_LDAP_BIND_PASSWORD:-}
      AD_LDAP_BIND_PRINCIPAL: ${AD_LDAP_BIND_PRINCIPAL:-}
      AD_KINIT_COMMAND: ${AD_KINIT_COMMAND:-kinit}
      AD_KDESTROY_COMMAND: ${AD_KDESTROY_COMMAND:-kdestroy}
      AD_KERBEROS_TIMEOUT_SECONDS: ${AD_KERBEROS_TIMEOUT_SECONDS:-15}
      AD_LDAP_TIMEOUT_SECONDS: ${AD_LDAP_TIMEOUT_SECONDS:-15}
      NEXUS_RAW_BASE_URL: ${NEXUS_RAW_BASE_URL:-http://nexus.example.invalid:8081/repository/raw-repo/skills}
      NEXUS_USERNAME: ${NEXUS_USERNAME:-}
      NEXUS_PASSWORD: ${NEXUS_PASSWORD:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8000}
      SKILLS_API_BASE_URL: ${SKILLS_API_BASE_URL:-https://skills.sh}
      SKILLS_API_TIMEOUT_SECONDS: ${SKILLS_API_TIMEOUT_SECONDS:-15}
      CLI_INSTALL_COMMAND: '${CLI_INSTALL_COMMAND:-npm install @xgd/nexgo-skills -g --registry "http://nexus.example.invalid:8081/repository/npm-all"}'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://127.0.0.1:8000/api/healthcheck || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16
    container_name: ssc-skills-lib-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-skills_lib}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
#    ports:
#      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-skills_lib}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
